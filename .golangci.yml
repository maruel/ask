# golangci-lint configuration.

version: "2"
run:
  tests: true
linters:
  enable:
    - bodyclose
    - canonicalheader
    - contextcheck
    - copyloopvar
    - dupword
    - durationcheck
    - errname
    - errorlint
    - exhaustive
    - fatcontext
    - forcetypeassert
    - gocritic
    - godot
    - gosec
    - intrange
    - mirror
    - misspell
    - modernize
    - musttag
    - nakedret
    - nilerr
    - nilnil
    - nolintlint
    - perfsprint
    - prealloc
    - recvcheck
    - revive
    - sloglint
    - unconvert
    - unparam
    - unused
    - usestdlibvars
    - usetesting
    - whitespace
  settings:
    exhaustive:
      default-signifies-exhaustive: true
    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
      disabled-checks:
        - commentedOutCode
        - exitAfterDefer
        - unnamedResult
    gosec:
      excludes:
        - G101
        - G107
        - G110
        - G115
        - G204
        - G301
        - G302
        - G304
        - G306
    revive:
      rules:
        - name: exported
          disabled: false
formatters:
  enable:
    - gofmt
    - goimports
